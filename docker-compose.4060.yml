services:
  qwen-4060:
    build:
      context: .
      dockerfile: Dockerfile.4060
    image: ghcr.io/janisxyz/qwen-image-edit-h100-vast:4060
    ports:
      - "8000:8000"
      - "8188:8188"
    environment:
      PROFILE: ${PROFILE:-auto}
      API_KEY: ${API_KEY:-local-test-key}
      HF_TOKEN: ${HF_TOKEN:-}
      LOCAL_GGUF_FILENAME: ${LOCAL_GGUF_FILENAME:-}
      DEFAULT_CANDIDATES: ${DEFAULT_CANDIDATES:-}
      MAX_CANDIDATES: ${MAX_CANDIDATES:-}
      COMFY_LISTEN_HOST: 0.0.0.0
      RESERVE_VRAM_GB: ${RESERVE_VRAM_GB:-}
    volumes:
      - ./workspace-4060:/workspace
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

name: Build container profiles

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile.*"
      - "app/**"
      - "scripts/**"
      - "workflows/**"
      - "tools/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: h100
            dockerfile: Dockerfile.h100
          - profile: 4060
            dockerfile: Dockerfile.4060

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/qwen-image-edit-h100-vast:${{ matrix.profile }}
          cache-from: type=gha,scope=${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.profile }}

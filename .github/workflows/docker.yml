name: Build all container profiles

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile.*"
      - "app/**"
      - "scripts/**"
      - "workflows/**"
      - "tools/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: H100, H200 NVL and RTX 6000 Ada BF16
            dockerfile: Dockerfile.h100
            cache_scope: cloud-bf16
            tags: |
              ghcr.io/janisxyz/qwen-image-edit-h100-vast:h100
              ghcr.io/janisxyz/qwen-image-edit-h100-vast:h200-nvl
              ghcr.io/janisxyz/qwen-image-edit-h100-vast:rtx6000-ada
          - name: RTX 4060 GGUF
            dockerfile: Dockerfile.4060
            cache_scope: local-4060
            tags: |
              ghcr.io/janisxyz/qwen-image-edit-h100-vast:4060

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ matrix.tags }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
